apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetrivo-backend
  namespace: meetrivo
  labels:
    app: meetrivo-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: meetrivo-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: meetrivo-backend
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: meetrivo-backend
          image: meetrivo/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: JWT_SECRET
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: REDIS_PASSWORD
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: SMTP_PORT
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: SMTP_PASSWORD
            - name: STORAGE_PATH
              valueFrom:
                secretKeyRef:
                  name: meetrivo-secrets
                  key: STORAGE_PATH
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1280Mi"
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: recordings-storage
              mountPath: /app/recordings
      volumes:
        - name: recordings-storage
          persistentVolumeClaim:
            claimName: meetrivo-recordings-pvc
